services:
  db:
    container_name: irrenanstalt-web-db
    image: postgres
    restart: always
    env_file: ".env"
    #environment:
      #POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      #POSTGRES_USER: ${POSTGRES_USER}
      #POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./irrenanstalt-web-db-data:/var/lib/postgresql